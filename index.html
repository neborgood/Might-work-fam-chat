<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Family Chat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');

  :root {
    --bg: #0f0e17;
    --surface: #1a1929;
    --surface2: #23213a;
    --accent: #e8c97e;
    --accent2: #7e8ce8;
    --text: #fffffe;
    --text-dim: #a7a3c2;
    --bubble-me: #3d3a6b;
    --bubble-them: #23213a;
    --border: rgba(255,255,255,0.07);
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    gap: 32px;
    background: radial-gradient(ellipse at 50% 0%, #2a2060 0%, var(--bg) 70%);
  }

  .logo-area {
    text-align: center;
  }

  .logo-icon {
    font-size: 56px;
    margin-bottom: 12px;
    display: block;
  }

  .logo-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .logo-sub {
    color: var(--text-dim);
    font-size: 14px;
    margin-top: 6px;
  }

  .login-card {
    width: 100%;
    max-width: 360px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .login-card h2 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-dim);
    text-align: center;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field-group label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .field-group input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field-group input:focus {
    border-color: var(--accent2);
  }

  .btn-primary {
    background: var(--accent);
    color: #0f0e17;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    width: 100%;
  }

  .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

  .room-hint {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.5;
  }

  /* ── CHAT SCREEN ── */
  #chat-screen {
    display: none;
    flex-direction: column;
    height: 100dvh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .room-avatar {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .header-info h1 {
    font-size: 16px;
    font-weight: 600;
  }

  .online-status {
    font-size: 12px;
    color: #6fcf97;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .online-dot {
    width: 6px;
    height: 6px;
    background: #6fcf97;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-right {
    display: flex;
    gap: 8px;
  }

  .icon-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: var(--text-dim);
    transition: background 0.15s;
  }

  .icon-btn:active { background: var(--surface2); opacity: 0.7; }

  /* ── MESSAGES AREA ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 0; }

  .date-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 12px 0 8px;
  }

  .date-divider span {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .date-divider::before, .date-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .msg-row {
    display: flex;
    flex-direction: column;
    max-width: 80%;
    gap: 3px;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-row.me {
    align-self: flex-end;
    align-items: flex-end;
  }

  .msg-row.them {
    align-self: flex-start;
    align-items: flex-start;
  }

  .sender-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent2);
    padding: 0 4px;
    letter-spacing: 0.03em;
  }

  .msg-row.me .sender-name {
    color: var(--accent);
  }

  .bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.5;
    word-break: break-word;
    position: relative;
  }

  .msg-row.me .bubble {
    background: var(--bubble-me);
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  .msg-row.them .bubble {
    background: var(--bubble-them);
    border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
  }

  .bubble-time {
    font-size: 10px;
    color: var(--text-dim);
    padding: 0 4px;
  }

  /* consecutive messages from same sender */
  .msg-row.me.grouped .bubble { border-top-right-radius: 4px; }
  .msg-row.them.grouped .bubble { border-top-left-radius: 4px; }
  .msg-row.grouped .sender-name { display: none; }

  /* System messages */
  .sys-msg {
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    margin: 8px 0;
    font-style: italic;
  }

  /* ── REACTION STRIP ── */
  .bubble:active {
    opacity: 0.85;
  }

  /* ── INPUT AREA ── */
  #input-area {
    padding: 12px 14px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 10px;
    flex-shrink: 0;
  }

  #msg-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 11px 15px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    resize: none;
    outline: none;
    max-height: 120px;
    min-height: 44px;
    line-height: 1.4;
    transition: border-color 0.2s;
  }

  #msg-input:focus { border-color: var(--accent2); }
  #msg-input::placeholder { color: var(--text-dim); }

  #send-btn {
    width: 44px;
    height: 44px;
    background: var(--accent);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.1s, opacity 0.15s;
  }

  #send-btn:active { transform: scale(0.92); }
  #send-btn:disabled { opacity: 0.4; }

  #send-btn svg { width: 18px; height: 18px; fill: #0f0e17; }

  /* ── EMOJI REACTIONS ── */
  .react-bar {
    display: none;
    gap: 6px;
    padding: 4px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    position: absolute;
    bottom: calc(100% + 6px);
    right: 0;
    z-index: 10;
    animation: fadeUp 0.15s ease;
  }

  .react-bar span {
    font-size: 18px;
    cursor: pointer;
    transition: transform 0.1s;
    padding: 2px;
  }
  .react-bar span:active { transform: scale(1.3); }

  .bubble-wrap { position: relative; }

  .reaction-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 2px;
  }

  .reaction-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2px 7px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .reaction-pill.mine {
    border-color: var(--accent2);
  }

  /* loading */
  #loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    flex-direction: column;
    gap: 16px;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--surface2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { color: var(--text-dim); font-size: 14px; }

  /* Setup info modal */
  #setup-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  #setup-modal.open { display: flex; }

  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
    max-width: 400px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-height: 90dvh;
    overflow-y: auto;
  }

  .modal-box h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--accent);
  }

  .modal-box p, .modal-box li {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-dim);
  }

  .modal-box ol {
    padding-left: 18px;
    display: flex;
    flex-direction: column;
